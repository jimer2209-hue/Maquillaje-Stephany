<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stephany Zambrano - Maquillaje Profesional</title>
    <!-- Librerías Externas vía CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.8s ease-out forwards; }
        .loading-shimmer {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente de Icono SVG personalizado para evitar errores de librerías externas
        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.28-2.28a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>,
                sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>,
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>,
                crown: <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7Z"/>,
                camera: (
                    <>
                        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
                        <circle cx="12" cy="13" r="3"/>
                    </>
                ),
                users: (
                    <>
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </>
                ),
                star: <path d="m12 2 3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2Z"/>,
                send: (
                    <>
                        <path d="m22 2-7 20-4-9-9-4 20-7Z"/>
                        <path d="M22 2 11 13"/>
                    </>
                ),
                x: (
                    <>
                        <path d="M18 6 6 18"/>
                        <path d="m6 6 12 12"/>
                    </>
                ),
                party: (
                    <>
                        <path d="M14 12a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
                        <path d="M18 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
                        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Z"/>
                        <path d="M12 12s-1.5 2-4 2"/>
                        <path d="M12 12s1.5 2 4 2"/>
                    </>
                ),
                calendar: (
                    <>
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </>
                ),
                loader: (
                    <>
                        <path d="M12 2v4"/>
                        <path d="m16.2 7.8 2.9-2.9"/>
                        <path d="M18 12h4"/>
                        <path d="m16.2 16.2 2.9 2.9"/>
                        <path d="M12 18v4"/>
                        <path d="m4.9 19.1 2.9-2.9"/>
                        <path d="M2 12h4"/>
                        <path d="m4.9 4.9 2.9 2.9"/>
                    </>
                ),
                wand: (
                    <>
                        <path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.21 1.21 0 0 0 1.72 0L21.64 5.36a1.21 1.21 0 0 0 0-1.72Z"/>
                        <path d="m14 7 3 3"/>
                    </>
                )
            };

            return (
                <svg 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || icons.sparkles}
                </svg>
            );
        };

        const App = () => {
            const [isVisible, setIsVisible] = useState(false);
            const [showAiModal, setShowAiModal] = useState(false);
            const [userPrompt, setUserPrompt] = useState('');
            const [aiAdvice, setAiAdvice] = useState('');
            const [isConsulting, setIsConsulting] = useState(false);
            const [isGeneratingImg, setIsGeneratingImg] = useState(false);
            const [generatedImg, setGeneratedImg] = useState(null);

            const apiKey = ""; 

            useEffect(() => {
                setIsVisible(true);
            }, []);

            const fetchWithRetry = async (url, options, retries = 3, delay = 1000) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) throw new Error(`Status: ${response.status}`);
                        return await response.json();
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(res => setTimeout(res, delay * (i + 1)));
                    }
                }
            };

            const handleAiConsultation = async () => {
                if (!userPrompt.trim()) return;
                setIsConsulting(true);
                setAiAdvice('');
                
                const systemPrompt = "Eres la asistente experta en belleza de Stephany Zambrano. Asesora brevemente sobre maquillaje ideal según el evento del usuario. Sé elegante y profesional.";
                
                try {
                    const data = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userPrompt }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        }
                    );
                    setAiAdvice(data.candidates?.[0]?.content?.parts?.[0]?.text || "¡Excelente elección!");
                } catch (error) {
                    setAiAdvice("Lo siento, hubo un problema. ¡Chatea conmigo por WhatsApp y te asesoro personalmente!");
                } finally {
                    setIsConsulting(false);
                }
            };

            const handleGenerateImage = async () => {
                if (!userPrompt.trim()) return;
                setIsGeneratingImg(true);
                setGeneratedImg(null);

                const promptText = `Professional high-end makeup look for ${userPrompt}, elegant photography, cinematic lighting, soft pastel colors.`;

                try {
                    const data = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                instances: { prompt: promptText },
                                parameters: { sampleCount: 1 }
                            })
                        }
                    );
                    const b64 = data.predictions[0].bytesBase64Encoded;
                    setGeneratedImg(`data:image/png;base64,${b64}`);
                } catch (error) {
                    console.error("Error generating image:", error);
                } finally {
                    setIsGeneratingImg(false);
                }
            };

            const getWhatsAppLink = () => {
                const base = "https://wa.me/593998299761";
                let messageText = `¡Hola Stephany! ✨ Mi evento es: "${userPrompt.trim()}"`;
                if (aiAdvice) {
                    messageText += `\n\nConsejo de tu IA: "${aiAdvice.substring(0, 150)}..."`;
                }
                return `${base}?text=${encodeURIComponent(messageText)}`;
            };

            const services = [
                { name: "Social", icon: "users" },
                { name: "Artístico", icon: "star" },
                { name: "Novias", icon: "heart" },
                { name: "Fiestas", icon: "party" },
                { name: "Eventos Especiales", icon: "calendar" },
                { name: "Reinas", icon: "crown" },
                { name: "Quinceañeras", icon: "sparkles" },
                { name: "Eventos Corporativos", icon: "camera" }
            ];

            return (
                <div className="flex items-center justify-center min-h-screen p-2 relative overflow-hidden bg-stone-200">
                    <button 
                        onClick={() => setShowAiModal(true)}
                        className="fixed bottom-6 right-6 z-50 bg-[#D4A373] text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform active:scale-90"
                    >
                        <Icon name="sparkles" size={24} />
                    </button>

                    <div className="relative w-full max-w-[360px] aspect-[9/16] bg-[#FAF7F2] overflow-hidden shadow-2xl rounded-[2.5rem] border-[6px] border-white flex flex-col animate-fade-in">
                        {/* Mosaico de Fondo */}
                        <div className="absolute inset-0 pointer-events-none opacity-[0.06] flex flex-wrap justify-around p-8">
                            <Icon name="sparkles" size={40} className="text-[#D4A373]" />
                            <Icon name="heart" size={30} className="text-[#D4A373] ml-20 mt-10" />
                            <Icon name="crown" size={50} className="text-[#D4A373] mt-40" />
                        </div>

                        <div className="absolute top-[-5%] right-[-10%] w-40 h-40 bg-[#F8E8EE] rounded-full blur-3xl opacity-60"></div>
                        <div className="absolute bottom-[20%] left-[-10%] w-48 h-48 bg-[#F3E9DD] rounded-full blur-3xl opacity-50"></div>
                        
                        <div className="relative flex-1 flex flex-col items-center py-4 px-6 transition-all">
                            <div className="text-center w-full">
                                <div className="flex justify-center mb-1.5">
                                    <svg width="45" height="45" viewBox="0 0 100 100" fill="none">
                                        <path d="M30 40C30 35 40 30 50 30C60 30 70 35 70 45C70 55 30 50 30 65C30 75 45 78 55 75" stroke="#D4A373" strokeWidth="2.5" strokeLinecap="round"/>
                                        <path d="M45 45L75 45L45 75L75 75" stroke="#5C524F" strokeWidth="2" strokeLinecap="round" opacity="0.6"/>
                                        <path d="M15 85C30 80 70 90 90 75" stroke="#E5C19D" strokeWidth="5" strokeLinecap="round" opacity="0.4" />
                                    </svg>
                                </div>
                                <h1 className="text-xl tracking-[0.1em] text-[#5C524F] font-serif uppercase leading-tight mt-1">Stephany Zambrano</h1>
                                <div className="h-[1px] w-8 bg-[#D4A373] mx-auto my-1.5"></div>
                                <p className="text-[#8E8071] text-[7px] uppercase tracking-[0.2em] font-light leading-none mb-2">Maquillaje Profesional</p>
                                <p className="text-[#A69085] italic text-[9.5px] font-medium mt-2 leading-none">"Resaltando tu luz propia con elegancia y arte"</p>
                            </div>

                            <div className="w-full flex flex-col space-y-1 mt-3">
                                {services.map((service, index) => (
                                    <div key={index} className="flex items-center space-x-3 bg-white/30 backdrop-blur-sm px-3 py-1 rounded-lg border border-white/40">
                                        <Icon name={service.icon} size={9} className="text-[#D4A373]" />
                                        <span className="text-[#72655E] text-[8.5px] font-medium tracking-tight uppercase leading-none">{service.name}</span>
                                    </div>
                                ))}
                            </div>

                            {/* Descripción Profesional Actualizada */}
                            <div className="mt-3 px-1">
                                <p className="text-[10px] leading-relaxed text-[#5C524F] text-center font-light">
                                    Fusionamos arte y elegancia para crear resultados impecables que resaltan 
                                    tu belleza única en cada momento inolvidable. Ofrecemos atención personalizada 
                                    en nuestro estudio y realizamos servicios a domicilio para su total comodidad.
                                </p>
                            </div>

                            <div className="w-full mt-auto space-y-1.5 mb-2">
                                <div onClick={() => setShowAiModal(true)} className="w-full bg-white/80 border border-[#D4A373]/30 rounded-xl py-1.5 px-3 cursor-pointer hover:bg-white/95 text-center shadow-sm">
                                    <p className="text-[8.5px] uppercase font-bold text-[#D4A373]">✨ Asesorate con IA!</p>
                                    <p className="text-[8.5px] text-[#5C524F]">Personaliza tu estilo</p>
                                </div>
                                <a href="https://wa.me/593998299761" target="_blank" className="flex items-center space-x-2 bg-[#D4A373] text-white py-3 rounded-full shadow-lg w-full justify-center active:scale-95">
                                    <Icon name="phone" size={12} className="mr-1" />
                                    <span className="font-bold text-[8.5px] uppercase tracking-widest">Reserva tu cita</span>
                                </a>
                            </div>
                        </div>
                    </div>

                    {showAiModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                            <div className="bg-[#FAF7F2] w-full max-w-[380px] rounded-[2rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-5 bg-[#D4A373] text-white flex justify-between items-center shadow-lg">
                                    <div className="flex items-center space-x-2 text-white">
                                        <Icon name="sparkles" size={20} />
                                        <h3 className="font-serif text-lg tracking-wide">Estudio de Imagen IA</h3>
                                    </div>
                                    <button onClick={() => {setShowAiModal(false); setAiAdvice(''); setGeneratedImg(null);}} className="text-white hover:rotate-90 transition-transform">
                                        <Icon name="x" size={24} />
                                    </button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6 bg-[#FAF7F2]">
                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase tracking-widest font-bold text-[#D4A373]">Describe tu ocasión:</label>
                                        <textarea 
                                            value={userPrompt}
                                            onChange={(e) => setUserPrompt(e.target.value)}
                                            placeholder="Ej: Tengo una graduación de noche..."
                                            className="w-full p-4 rounded-xl border border-[#D4A373]/20 text-xs h-24 outline-none bg-white shadow-inner focus:ring-1 focus:ring-[#D4A373]"
                                        />
                                    </div>
                                    
                                    <div className="flex flex-col gap-2">
                                        <button 
                                            onClick={handleAiConsultation}
                                            disabled={isConsulting || !userPrompt.trim()}
                                            className="w-full bg-[#5C524F] text-white py-3.5 rounded-full text-[10px] font-bold uppercase flex justify-center items-center gap-2 active:scale-95 disabled:opacity-50"
                                        >
                                            {isConsulting ? <Icon name="loader" size={16} className="animate-spin" /> : "Consultar IA ✨"}
                                        </button>
                                        
                                        <button 
                                            onClick={handleGenerateImage}
                                            disabled={isGeneratingImg || !userPrompt.trim()}
                                            className="w-full border-2 border-[#D4A373] text-[#D4A373] py-3 rounded-full text-[10px] font-bold uppercase flex justify-center items-center gap-2 active:scale-95 disabled:opacity-50"
                                        >
                                            {isGeneratingImg ? <Icon name="loader" size={16} className="animate-spin" /> : <><Icon name="wand" size={16} /> Inspiración Visual ✨</>}
                                        </button>
                                    </div>

                                    {(aiAdvice || isConsulting) && (
                                        <div className="p-4 bg-white rounded-2xl border-l-4 border-[#D4A373] shadow-sm animate-fade-in">
                                            <p className="text-[10px] uppercase font-bold text-[#D4A373] mb-2 tracking-widest">Sugerencia de Stephany IA:</p>
                                            {isConsulting ? (
                                                <div className="space-y-2">
                                                    <div className="h-2 w-3/4 loading-shimmer rounded"></div>
                                                    <div className="h-2 w-full loading-shimmer rounded"></div>
                                                </div>
                                            ) : (
                                                <p className="text-[11px] text-[#5C524F] leading-relaxed italic">"{aiAdvice}"</p>
                                            )}
                                        </div>
                                    )}

                                    {(generatedImg || isGeneratingImg) && (
                                        <div className="space-y-2 animate-fade-in">
                                            <p className="text-[10px] uppercase font-bold text-[#D4A373] tracking-widest">Inspiración Visual:</p>
                                            <div className="relative aspect-square rounded-2xl overflow-hidden shadow-lg bg-stone-100 flex items-center justify-center">
                                                {isGeneratingImg ? (
                                                    <Icon name="loader" size={32} className="animate-spin text-[#D4A373]" />
                                                ) : (
                                                    <img src={generatedImg} alt="Look" className="w-full h-full object-cover" />
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="p-4 bg-white text-center border-t border-stone-100">
                                    <a href={getWhatsAppLink()} target="_blank" className="bg-[#D4A373] text-white px-8 py-3 rounded-full text-[10px] font-bold uppercase shadow-lg inline-block active:scale-95 transition-transform">
                                        Enviar pedido por WhatsApp ✉️
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
