<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stephany Zambrano - Maquillaje Profesional</title>
    <!-- Librerías Externas vía CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Usamos lucide-react para mejor integración con React -->
    <script src="https://unpkg.com/lucide-react"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.8s ease-out forwards; }
        .loading-shimmer {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Phone, Sparkles, Heart, Crown, Camera, Users, Star, Send, X, PartyPopper, CalendarDays, Loader2, Sparkle, Wand2 } = LucideReact;

        const App = () => {
            const [isVisible, setIsVisible] = useState(false);
            const [showAiModal, setShowAiModal] = useState(false);
            const [userPrompt, setUserPrompt] = useState('');
            const [aiAdvice, setAiAdvice] = useState('');
            const [isConsulting, setIsConsulting] = useState(false);
            const [isGeneratingImg, setIsGeneratingImg] = useState(false);
            const [generatedImg, setGeneratedImg] = useState(null);

            const apiKey = ""; // La clave se provee en el entorno de ejecución

            useEffect(() => {
                setIsVisible(true);
            }, []);

            // Implementación de Exponential Backoff para la API de Gemini
            const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                        return await response.json();
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(res => setTimeout(res, delay * Math.pow(2, i)));
                    }
                }
            };

            const handleAiConsultation = async () => {
                if (!userPrompt.trim()) return;
                setIsConsulting(true);
                setAiAdvice('');
                
                const systemPrompt = "Eres la asistente experta en colorimetría y belleza de Stephany Zambrano. Tu objetivo es asesorar a las clientas sobre el maquillaje ideal basándote en su evento y outfit. Sugiere paleta de colores para ojos, labial y estilo general. Mantén un tono elegante, profesional y breve. Finaliza invitando a agendar una cita.";
                
                try {
                    const data = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userPrompt }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        }
                    );
                    const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    setAiAdvice(responseText);
                } catch (error) {
                    setAiAdvice("Lo siento, no pude procesar tu asesoría en este momento. Por favor, intenta de nuevo o chatea directamente conmigo.");
                } finally {
                    setIsConsulting(false);
                }
            };

            const handleGenerateImage = async () => {
                if (!userPrompt.trim()) return;
                setIsGeneratingImg(true);
                setGeneratedImg(null);

                const promptText = `Professional editorial makeup look for ${userPrompt}, elegant high-end photography, cinematic lighting, soft pastel colors, flawless skin, detailed eye makeup.`;

                try {
                    const data = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                instances: { prompt: promptText },
                                parameters: { sampleCount: 1 }
                            })
                        }
                    );
                    const b64 = data.predictions[0].bytesBase64Encoded;
                    setGeneratedImg(`data:image/png;base64,${b64}`);
                } catch (error) {
                    console.error("Error generating image:", error);
                } finally {
                    setIsGeneratingImg(false);
                }
            };

            const getWhatsAppLink = () => {
                const base = "https://wa.me/593998299761";
                const messageText = aiAdvice ? `He consultado a tu IA y me recomendó esto: ${aiAdvice.substring(0, 100)}...` : userPrompt;
                if (!messageText.trim()) return base;
                
                const message = `¡Hola Stephany! ✨ Vengo de tu página web. Mi evento es: "${messageText.trim()}"`;
                return `${base}?text=${encodeURIComponent(message)}`;
            };

            const services = [
                { name: "Social", icon: <Users size={9} /> },
                { name: "Artístico", icon: <Star size={9} /> },
                { name: "Novias", icon: <Heart size={9} /> },
                { name: "Fiestas", icon: <PartyPopper size={9} /> },
                { name: "Eventos Especiales", icon: <CalendarDays size={9} /> },
                { name: "Reinas", icon: <Crown size={9} /> },
                { name: "Quinceañeras", icon: <Sparkles size={9} /> },
                { name: "Eventos Corporativos", icon: <Camera size={9} /> }
            ];

            return (
                <div className="flex items-center justify-center min-h-screen p-2 relative overflow-hidden bg-stone-200">
                    {/* Botón Flotante para el Asesor */}
                    <button 
                        onClick={() => setShowAiModal(true)}
                        className="fixed bottom-6 right-6 z-50 bg-[#D4A373] text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform active:scale-90"
                    >
                        <Sparkles size={24} />
                    </button>

                    <div className="relative w-full max-w-[360px] aspect-[9/16] bg-[#FAF7F2] overflow-hidden shadow-2xl rounded-[2.5rem] border-[6px] border-white flex flex-col animate-fade-in">
                        
                        <div className="absolute inset-0 pointer-events-none opacity-[0.06] flex flex-wrap justify-around p-8">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#D4A373" strokeWidth="1"><path d="m18 8-2 2-6 6-2 2"/><path d="M2 22s1-4 4-4 4 1 4 4"/><path d="M14 6c.7-1.3 1.8-2 3-2 2.2 0 4 1.8 4 4 0 1.2-.7 2.3-2 3"/><path d="m15 5 4 4"/></svg>
                        </div>

                        <div className="absolute top-[-5%] right-[-10%] w-40 h-40 bg-[#F8E8EE] rounded-full blur-3xl opacity-60"></div>
                        <div className="absolute bottom-[20%] left-[-10%] w-48 h-48 bg-[#F3E9DD] rounded-full blur-3xl opacity-50"></div>
                        
                        <div className="relative flex-1 flex flex-col items-center py-4 px-6 transition-all duration-1000">
                            
                            {/* Cabecera y Logo */}
                            <div className="text-center w-full">
                                <div className="flex justify-center mb-1.5">
                                    <svg width="45" height="45" viewBox="0 0 100 100" fill="none">
                                        <path d="M30 40C30 35 40 30 50 30C60 30 70 35 70 45C70 55 30 50 30 65C30 75 45 78 55 75" stroke="#D4A373" strokeWidth="2.5" strokeLinecap="round"/>
                                        <path d="M45 45L75 45L45 75L75 75" stroke="#5C524F" strokeWidth="2" strokeLinecap="round" opacity="0.6"/>
                                        <path d="M15 85C30 80 70 90 90 75" stroke="#E5C19D" strokeWidth="5" strokeLinecap="round" opacity="0.4" />
                                    </svg>
                                </div>
                                <h1 className="text-xl tracking-[0.1em] text-[#5C524F] font-serif uppercase leading-tight mt-1">
                                    Stephany Zambrano
                                </h1>
                                <div className="h-[1px] w-8 bg-[#D4A373] mx-auto my-1.5"></div>
                                <p className="text-[#8E8071] text-[7px] uppercase tracking-[0.2em] font-light leading-none mb-2">
                                    Maquillaje Profesional
                                </p>
                                <p className="text-[#A69085] italic text-[9.5px] font-medium mt-2 leading-none">
                                    "Resaltando tu luz propia con elegancia y arte"
                                </p>
                            </div>

                            {/* Servicios */}
                            <div className="w-full flex flex-col space-y-1 mt-3">
                                <div className="grid grid-cols-1 gap-0.5">
                                    {services.map((service, index) => (
                                        <div key={index} className="flex items-center space-x-3 bg-white/30 backdrop-blur-sm px-3 py-1 rounded-lg border border-white/40">
                                            <span className="text-[#D4A373] flex-shrink-0">{service.icon}</span>
                                            <span className="text-[#72655E] text-[8.5px] font-medium tracking-tight uppercase leading-none">{service.name}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Descripción Profesional */}
                            <div className="mt-3 px-1">
                                <p className="text-[10px] leading-relaxed text-[#5C524F] text-center font-light">
                                    Fusionamos arte y elegancia para crear resultados impecables que resaltan 
                                    tu belleza única en cada momento inolvidable. Ofrecemos atención 
                                    personalizada en <span className="font-semibold">nuestro estudio</span> y 
                                    realizamos <span className="font-semibold">servicios a domicilio</span> para tu total comodidad.
                                </p>
                            </div>

                            {/* Botones de Acción */}
                            <div className="w-full mt-auto space-y-1.5 mb-2">
                                <div 
                                    onClick={() => setShowAiModal(true)}
                                    className="w-full bg-white/80 border border-[#D4A373]/30 rounded-xl py-1.5 px-3 cursor-pointer hover:bg-white/95 transition-all text-center shadow-sm"
                                >
                                    <p className="text-[8.5px] uppercase font-bold text-[#D4A373]">✨ Asesorate con IA!</p>
                                    <p className="text-[8.5px] text-[#5C524F]">Personaliza tu estilo</p>
                                </div>

                                <a 
                                    href="https://wa.me/593998299761" 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="flex items-center space-x-2 bg-[#D4A373] text-white py-3 rounded-full shadow-lg hover:bg-[#C29262] transition-all w-full justify-center active:scale-95"
                                >
                                    <Phone size={12} className="mr-1" />
                                    <span className="font-bold text-[8.5px] uppercase tracking-widest">Reserva tu cita</span>
                                </a>
                            </div>

                            {/* Ilustración Final */}
                            <div className="opacity-30 pb-1">
                                <svg width="90" height="35" viewBox="0 0 120 80" fill="none">
                                    <rect x="20" y="40" width="10" height="30" rx="2" fill="#D4A373" />
                                    <circle cx="70" cy="55" r="15" stroke="#D4A373" strokeWidth="1" />
                                    <rect x="95" y="10" width="4" height="40" fill="#5C524F" transform="rotate(15, 95, 10)" />
                                    <path d="M108 55C115 65 95 75 102 60L108 55Z" fill="#D4A373" opacity="0.6" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    {/* Modal de Asesoría con IA Gemini */}
                    {showAiModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                            <div className="bg-[#FAF7F2] w-full max-w-[380px] rounded-[2rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-5 bg-[#D4A373] text-white flex justify-between items-center shadow-lg">
                                    <div className="flex items-center space-x-2">
                                        <Sparkles size={20} />
                                        <h3 className="font-serif text-lg text-white tracking-wide">Estudio de Imagen IA</h3>
                                    </div>
                                    <button onClick={() => {setShowAiModal(false); setAiAdvice(''); setGeneratedImg(null);}} className="text-white hover:rotate-90 transition-transform">
                                        <X size={24} />
                                    </button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6 bg-[#FAF7F2]">
                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase tracking-widest font-bold text-[#D4A373]">Describe tu ocasión:</label>
                                        <textarea 
                                            value={userPrompt}
                                            onChange={(e) => setUserPrompt(e.target.value)}
                                            placeholder="Ej: Tengo una graduación de noche, mi vestido es azul marino con pedrería..."
                                            className="w-full p-4 rounded-xl border border-[#D4A373]/20 text-xs h-24 outline-none bg-white shadow-inner focus:ring-1 focus:ring-[#D4A373] transition-all"
                                        />
                                    </div>
                                    
                                    <div className="flex flex-col gap-2">
                                        <button 
                                            onClick={handleAiConsultation}
                                            disabled={isConsulting || !userPrompt.trim()}
                                            className="w-full bg-[#5C524F] text-white py-3.5 rounded-full text-[10px] font-bold uppercase flex justify-center items-center gap-2 active:scale-95 transition-transform shadow-md disabled:opacity-50"
                                        >
                                            {isConsulting ? <Loader2 size={16} className="animate-spin" /> : <Sparkle size={16} />}
                                            Consultar IA ✨
                                        </button>
                                        
                                        <button 
                                            onClick={handleGenerateInspiration}
                                            disabled={isGeneratingImg || !userPrompt.trim()}
                                            className="w-full border-2 border-[#D4A373] text-[#D4A373] py-3 rounded-full text-[10px] font-bold uppercase flex justify-center items-center gap-2 active:scale-95 transition-transform disabled:opacity-50"
                                            onClick={handleGenerateImage}
                                        >
                                            {isGeneratingImg ? <Loader2 size={16} className="animate-spin" /> : <Wand2 size={16} />}
                                            Inspiración Visual ✨
                                        </button>
                                    </div>

                                    {(aiAdvice || isConsulting) && (
                                        <div className="p-4 bg-white rounded-2xl border-l-4 border-[#D4A373] shadow-sm animate-fade-in min-h-[80px]">
                                            <p className="text-[10px] uppercase font-bold text-[#D4A373] mb-2 tracking-widest">Recomendación de Stephany IA:</p>
                                            {isConsulting ? (
                                                <div className="space-y-2">
                                                    <div className="h-2 w-3/4 loading-shimmer rounded"></div>
                                                    <div className="h-2 w-full loading-shimmer rounded"></div>
                                                    <div className="h-2 w-1/2 loading-shimmer rounded"></div>
                                                </div>
                                            ) : (
                                                <p className="text-[11px] text-[#5C524F] leading-relaxed italic">"{aiAdvice}"</p>
                                            )}
                                        </div>
                                    )}

                                    {(generatedImg || isGeneratingImg) && (
                                        <div className="space-y-2 animate-fade-in">
                                            <p className="text-[10px] uppercase font-bold text-[#D4A373] tracking-widest">Look Visual Propuesto:</p>
                                            <div className="relative aspect-square rounded-2xl overflow-hidden shadow-lg bg-stone-100 flex items-center justify-center">
                                                {isGeneratingImg ? (
                                                    <div className="flex flex-col items-center gap-2">
                                                        <Loader2 size={32} className="animate-spin text-[#D4A373]" />
                                                        <span className="text-[10px] text-stone-400 font-medium">Creando inspiración única...</span>
                                                    </div>
                                                ) : (
                                                    <img src={generatedImg} alt="Maquillaje generado por IA" className="w-full h-full object-cover" />
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="p-4 bg-white text-center border-t border-stone-100">
                                    <a 
                                        href={getWhatsAppLink()} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="flex flex-col items-center group"
                                    >
                                        <span className="bg-[#D4A373] text-white px-8 py-3 rounded-full text-[10px] font-bold uppercase shadow-lg group-hover:bg-[#C29262] transition-colors">
                                            Agendar con este Look ✨
                                        </span>
                                        <span className="text-[8px] text-stone-400 mt-2">Se enviará tu descripción y el consejo de la IA</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
