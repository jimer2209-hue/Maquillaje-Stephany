<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stephany Zambrano - Maquillaje Profesional</title>
    <!-- Librerías Externas vía CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.8s ease-out forwards; }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Phone, Sparkles, Heart, Crown, Camera, Users, Star, Send, Loader2, X, PartyPopper, CalendarDays } = lucide;

        const App = () => {
            const [isVisible, setIsVisible] = useState(false);
            const [showAiModal, setShowAiModal] = useState(false);
            const [userPrompt, setUserPrompt] = useState('');
            const [aiResponse, setAiResponse] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            const apiKey = ""; 

            useEffect(() => {
                setIsVisible(true);
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);

            const services = [
                { name: "Social", icon: "users" },
                { name: "Artístico", icon: "star" },
                { name: "Novias", icon: "heart" },
                { name: "Fiestas", icon: "party-popper" },
                { name: "Eventos Especiales", icon: "calendar-days" },
                { name: "Reinas", icon: "crown" },
                { name: "Quinceañeras", icon: "sparkles" },
                { name: "Eventos Corporativos", icon: "camera" }
            ];

            const getStyleAdvice = async () => {
                if (!userPrompt.trim()) return;
                setIsLoading(true);
                setAiResponse('');
                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userPrompt }] }],
                                systemInstruction: { parts: [{ text: "Eres una experta maquilladora asistente de Stephany Zambrano. Recomienda estilos de maquillaje elegantes de forma breve y amable." }] }
                            })
                        }
                    );
                    const result = await response.json();
                    setAiResponse(result.candidates?.[0]?.content?.parts?.[0]?.text || "¡Me encanta esa idea! Stephany puede crear un look de maquillaje perfecto para ti.");
                } catch (e) { 
                    setAiResponse("Nuestra consultora IA está ocupada. ¡Escríbeme directamente por WhatsApp!"); 
                } finally { setIsLoading(false); }
            };

            // Función para generar el link de WhatsApp con el contenido del "Bot"
            const getWhatsAppLink = () => {
                const base = "https://wa.me/593998299761";
                if (!userPrompt.trim()) return base;
                
                const message = `Hola Stephany! ✨ Vengo de tu página web. Mi evento es el siguiente: "${userPrompt.trim()}". Me gustaría agendar una cita.`;
                return `${base}?text=${encodeURIComponent(message)}`;
            };

            return (
                <div className="flex items-center justify-center min-h-screen p-2 relative overflow-hidden bg-stone-200">
                    {/* Botón Flotante IA */}
                    <button 
                        onClick={() => setShowAiModal(true)}
                        className="fixed bottom-6 right-6 z-50 bg-[#D4A373] text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform active:scale-90"
                    >
                        <i data-lucide="sparkles"></i>
                    </button>

                    <div className="relative w-full max-w-[360px] aspect-[9/16] bg-[#FAF7F2] overflow-hidden shadow-2xl rounded-[2.5rem] border-[6px] border-white flex flex-col animate-fade-in">
                        
                        <div className="absolute inset-0 pointer-events-none opacity-[0.06] flex flex-wrap justify-around p-8">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#D4A373" strokeWidth="1"><path d="m18 8-2 2-6 6-2 2"/><path d="M2 22s1-4 4-4 4 1 4 4"/><path d="M14 6c.7-1.3 1.8-2 3-2 2.2 0 4 1.8 4 4 0 1.2-.7 2.3-2 3"/><path d="m15 5 4 4"/></svg>
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#D4A373" strokeWidth="1" className="ml-20 mt-10"><circle cx="12" cy="12" r="10"/><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/></svg>
                        </div>

                        <div className="absolute top-[-5%] right-[-10%] w-40 h-40 bg-[#F8E8EE] rounded-full blur-3xl opacity-60"></div>
                        <div className="absolute bottom-[20%] left-[-10%] w-48 h-48 bg-[#F3E9DD] rounded-full blur-3xl opacity-50"></div>
                        
                        <div className="relative flex-1 flex flex-col items-center py-4 px-6 transition-all duration-1000">
                            
                            <div className="text-center w-full">
                                <div className="flex justify-center mb-1.5">
                                    <svg width="45" height="45" viewBox="0 0 100 100" fill="none">
                                        <path d="M30 40C30 35 40 30 50 30C60 30 70 35 70 45C70 55 30 50 30 65C30 75 45 78 55 75" stroke="#D4A373" strokeWidth="2.5" strokeLinecap="round"/>
                                        <path d="M45 45L75 45L45 75L75 75" stroke="#5C524F" strokeWidth="2" strokeLinecap="round" opacity="0.6"/>
                                        <path d="M15 85C30 80 70 90 90 75" stroke="#E5C19D" strokeWidth="5" strokeLinecap="round" opacity="0.4" />
                                    </svg>
                                </div>
                                <h1 className="text-xl tracking-[0.1em] text-[#5C524F] font-serif uppercase leading-tight mt-1">
                                    Stephany Zambrano
                                </h1>
                                <div className="h-[1px] w-8 bg-[#D4A373] mx-auto my-1.5"></div>
                                <p className="text-[#8E8071] text-[7px] uppercase tracking-[0.2em] font-light leading-none mb-2">
                                    Maquillaje Profesional
                                </p>
                                <p className="text-[#A69085] italic text-[9.5px] font-medium mt-2 leading-none">
                                    "Resaltando tu luz propia con elegancia y arte"
                                </p>
                            </div>

                            <div className="w-full flex flex-col space-y-1 mt-3">
                                <div className="grid grid-cols-1 gap-0.5">
                                    {services.map((service, index) => (
                                        <div key={index} className="flex items-center space-x-3 bg-white/30 backdrop-blur-sm px-3 py-1 rounded-lg border border-white/40">
                                            <i data-lucide={service.icon} style={{width:9, height:9}} className="text-[#D4A373]"></i>
                                            <span className="text-[#72655E] text-[8.5px] font-medium tracking-tight uppercase leading-none">{service.name}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="mt-3 px-1">
                                <p className="text-[10px] leading-relaxed text-[#5C524F] text-center font-light">
                                    Fusionamos arte y elegancia para crear resultados impecables que resaltan 
                                    tu belleza única en cada momento inolvidable. Ofrecemos atención 
                                    personalizada en <span className="font-semibold">nuestro estudio</span> y 
                                    realizamos <span className="font-semibold">servicios a domicilio</span> para su total comodidad.
                                </p>
                            </div>

                            <div className="w-full mt-auto space-y-1.5 mb-2">
                                <div 
                                    onClick={() => setShowAiModal(true)}
                                    className="w-full bg-white/80 border border-[#D4A373]/30 rounded-xl py-1.5 px-3 cursor-pointer hover:bg-white/95 transition-all text-center shadow-sm"
                                >
                                    <p className="text-[8.5px] uppercase font-bold text-[#D4A373]">✨ Asesorate!</p>
                                    <p className="text-[8.5px] text-[#5C524F]">Personaliza tu estilo</p>
                                </div>

                                <a 
                                    href="https://wa.me/593998299761" 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="flex items-center space-x-2 bg-[#D4A373] text-white py-3 rounded-full shadow-lg hover:bg-[#C29262] transition-all w-full justify-center active:scale-95"
                                >
                                    <i data-lucide="phone" style={{width:12, height:12}}></i>
                                    <span className="font-bold text-[8.5px] uppercase tracking-widest">Reserva tu cita</span>
                                </a>
                            </div>

                            <div className="opacity-30 pb-1">
                                <svg width="90" height="35" viewBox="0 0 120 80" fill="none">
                                    <rect x="20" y="40" width="10" height="30" rx="2" fill="#D4A373" />
                                    <circle cx="70" cy="55" r="15" stroke="#D4A373" strokeWidth="1" />
                                    <rect x="95" y="10" width="4" height="40" fill="#5C524F" transform="rotate(15, 95, 10)" />
                                    <path d="M108 55C115 65 95 75 102 60L108 55Z" fill="#D4A373" opacity="0.6" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    {/* Modal IA con "Envío tipo Bot" a WhatsApp */}
                    {showAiModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                            <div className="bg-[#FAF7F2] w-full max-w-[340px] rounded-[2rem] shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
                                <div className="p-5 bg-[#D4A373] text-white flex justify-between items-center">
                                    <h3 className="font-serif text-md text-white">Asesoría Stephany ✨</h3>
                                    <button onClick={() => setShowAiModal(false)} className="text-white"><i data-lucide="x"></i></button>
                                </div>
                                <div className="p-5 overflow-y-auto space-y-4">
                                    <textarea 
                                        value={userPrompt}
                                        onChange={(e) => setUserPrompt(e.target.value)}
                                        placeholder="Cuéntame sobre tu evento y tu outfit..."
                                        className="w-full p-3 rounded-xl border border-[#D4A373]/20 text-xs h-20 outline-none bg-white shadow-inner"
                                    />
                                    <div className="flex gap-2">
                                        <button onClick={getStyleAdvice} className="flex-1 bg-[#5C524F] text-white py-2.5 rounded-full text-[10px] font-bold uppercase flex justify-center items-center gap-2 active:scale-95 transition-transform">
                                            {isLoading ? <Loader2 className="animate-spin" size={12} /> : "Consultar IA ✨"}
                                        </button>
                                    </div>
                                    {aiResponse && <div className="p-3 bg-white rounded-lg border-l-2 border-[#D4A373] text-[10px] text-[#5C524F] leading-relaxed shadow-sm">{aiResponse}</div>}
                                </div>
                                
                                {/* Link Dinámico: Aquí se comporta como Bot enviando el prompt al WS */}
                                <div className="p-4 bg-stone-50 text-center border-t border-stone-200">
                                    <a 
                                        href={getWhatsAppLink()} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="flex flex-col items-center group"
                                    >
                                        <span className="text-[#D4A373] text-[10px] font-bold uppercase underline decoration-dotted group-hover:decoration-solid">
                                            {userPrompt ? "Enviar este pedido a Stephany" : "Reserva con Stephany"}
                                        </span>
                                        <span className="text-[8px] text-stone-400 mt-1">El mensaje se enviará por WhatsApp</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        window.addEventListener('load', () => {
            if (window.lucide) window.lucide.createIcons();
        });
    </script>
</body>
</html>
